<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stratum</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>

<div class="container">
    <div class="game-wrapper">
        
        <div id="chessboard" class="chessboard">
            <!-- grid squares added through Javascript -->
        </div>

        <div class="side-console">
            <h3>Game Modifiers</h3>
            
            <!-- Row 1: Buffs (Green) -->
            <div class="console-row">
                <button id="btn-1" class="console-btn btn-green" data-tooltip="Start with an extra Queen." data-id=1>
                    <img src="/static/images/gain_queen.png" class="btn-icon">
                </button>
                <button id="btn-2" class="console-btn btn-green" data-tooltip="Start with an extra Rook." data-id=2>
                    <img src="/static/images/gain_rook.png" class="btn-icon">
                </button>
                <button id="btn-3" class="console-btn btn-green" data-tooltip="Start with an extra Bishop." data-id=3>
                    <img src="/static/images/gain_bishop.png" class="btn-icon">
                </button>
                <button id="btn-4" class="console-btn btn-green" data-tooltip="Start with an extra Knight." data-id=4>
                    <img src="/static/images/gain_knight.png" class="btn-icon">
                </button>
            </div>

            <!-- Row 2: Buffs (Green) -->
            <div class="console-row">
                <button id="btn-5" class="console-btn btn-green" data-tooltip="Start with an extra Pawn." data-id=5>
                    <img src="/static/images/gain_pawn.png" class="btn-icon">
                </button>
                <button class="console-btn btn-green" data-tooltip="Start with one extra move." data-id=6>
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-green" data-tooltip="Gain undo-move button." data-id=7>
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-green" data-tooltip="Remove any opponent piece (excluding King)." data-id=8>
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
            </div>

            <!-- Row 3: Neutral Effects (Yellow) -->
            <div class="console-row">
                <button class="console-btn btn-yellow" data-tooltip="Both sides have their first rank pieces randomized.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-yellow" data-tooltip="Start with one extra move.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-yellow" data-tooltip="Gain undo-move button.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-yellow" data-tooltip="Remove any opponent piece (excluding King).">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
            </div>

            <!-- Row 4: Debuffs (Red) -->
            <div class="console-row">
                <button class="console-btn btn-red" data-tooltip="Your Queen(s) cannot move.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-red" data-tooltip="Your Rook(s) cannot move.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-red" data-tooltip="Your Bishop(s) cannot move.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-red" data-tooltip="Your Knight(s) cannot move.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
            </div>

            <!-- Row 5: Debuffs (Red) -->
            <div class="console-row">
                <button class="console-btn btn-red" data-tooltip="Your King cannot move.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-red" data-tooltip="Pawns may only promote to pawns.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-red" data-tooltip="Your opponent starts with two extra moves.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
                <button class="console-btn btn-red" data-tooltip="Four of your pieces are removed at random.">
                    <img src="/static/images/temp.png" class="btn-icon">
                </button>
            </div>
        </div>

        <div class="level-description"> 
            <h3 id="level-number">Level [id]</h3>
            <div class="setting-item">
                <label for="engineSelect">Engine Difficulty:</label>
                <select id="engineSelect">
                    <option value="1">Intermediate (1320) ⭐</option>
                    <option value="2">Advanced (1800) ⭐⭐</option>
                    <option value="3">Expert (2200) ⭐⭐⭐</option>
                </select>
            </div>

            <div class="challenges-section">
                <h3 class="challenges-title">Challenges</h3>
                
                <div class="challenges-grid">
                    <div id="challenge-1" class="challenge-card">
                        <div class="challenge-header">
                            <span class="challenge-star">★</span>
                            <span class="challenge-status">Locked</span>
                        </div>
                        <p class="challenge-desc"></p>
                    </div>

                    <div id="challenge-2" class="challenge-card">
                        <div class="challenge-header">
                            <span class="challenge-star">★</span>
                            <span class="challenge-status">Locked</span>
                        </div>
                        <p class="challenge-desc"></p>
                    </div>

                    <div id="challenge-3" class="challenge-card">
                        <div class="challenge-header">
                            <span class="challenge-star">★</span>
                            <span class="challenge-status">Locked</span>
                        </div>
                        <p class="challenge-desc"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div>
            <h2>stratum</h2>
            <div class="status-box">
                <strong>Status:</strong>
                <div id="status">White's Turn</div>
            </div>
        </div>
        
        <div class="controls">
            <button id="new-game">New Game</button>
            <button id="undo-btn">Undo</button>
            <button id="settings-btn">Settings</button>
            <button id="level-select-btn">Level Select</button>
        </div>
    </div>

    <!-- promotion screen when promoting -->
    <div id="promotionOverlay" class="promotion-overlay">
        <div class="promotion-box">
            <h3>Select Promotion Piece</h3>
            <div class="promotion-options">
                <button class="promotion-option" data-piece="q">♛</button>
                <button class="promotion-option" data-piece="r">♜</button>
                <button class="promotion-option" data-piece="b">♝</button>
                <button class="promotion-option" data-piece="n">♞</button>
            </div>
        </div>
    </div>

    <<!-- settings menu -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div id="settingsSidebar" class="settings-sidebar">
        <div class="sidebar-header">
            <h3>Game Settings</h3>
            <button class="close-sidebar-btn" id="close-settings-btn">×</button>
        </div>
        
        <!-- specific settings -->
        <!-- TODO: add more themes -->
        <div class="setting-item">
            <label for="themeSelect">Board Theme:</label>
            <select id="boardThemeSelect">
                <option value="classic">Classic Wood</option>
                <option value="green">Tournament Green</option>
                <option value="blue">Ocean Blue</option>
            </select>

            <label for="themeSelect">Board Pieces:</label>
            <select id="pieceThemeSelect">
                <option value="text">Classic Text</option>
                <option value="modern">Modern</option>
            </select>
        </div>
    </div>

    <!-- level select menu -->
    <div id="levelOverlay" class="sidebar-overlay"></div>
    <div id="levelSidebar" class="settings-sidebar">
        <div class="sidebar-header">
            <h3>Select Level</h3>
            <button class="close-sidebar-btn" id="close-level-btn">×</button>
        </div>
        
        <div class="level-container">
            <div id="levelGrid" class="level-grid">
                <!-- buttons added through Javascript -->
            </div>
        </div>
    </div>
</div>

<div id="gameOverModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 id="modalStatus" class="modal-title">LEVEL [result]</h2>
        
        <div id="modalStars" class="stars-container">
            <span class="star" data-star="1">★</span>
            <span class="star" data-star="2">★</span>
            <span class="star" data-star="3">★</span>
        </div>

        <hr class="modal-divider">

        <div class="modal-details">
            <div class="detail-item">
                <span class="detail-label">stockfish difficulty:</span>
                <span id="modalDifficulty" class="detail-value">[difficulty]</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">active modifiers:</span>
                <ul id="modalModifiers" class="modifier-list">
                    </ul>
            </div>
        </div>

        <div class="modal-actions">
            <button class="modal-btn primary-btn" id="play-again-btn">Play Again</button>
            <button class="modal-btn secondary-btn" id="next-level-btn">Next Level</button>
        </div>
    </div>
</div>

<!-- buttons in bottom right -->
<button class="home-btn" id="home-btn" data-tooltip="Return to main menu">
    <span class="btn-content-wrapper">
        <img src="/static/images/home-icon.png" alt="Home" class="btn-icon">
    </span>
</button>

<script type="module" src="static/game.js"></script>

</body>
</html>
